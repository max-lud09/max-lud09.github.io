<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BHRT · Paralympics Milano Cortina · Broadcast Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
        }

        body {
            background: #1a1e2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            transition: all 0.4s ease;
        }

        /* PRÄSENTATIONSMODUS */
        body.presentation-mode {
            padding: 0;
            background: #000;
            display: block;
            overflow: hidden;
        }

        body.presentation-mode .upload-area,
        body.presentation-mode .control-bar {
            display: none;
        }

        /* Hintergrundbild-Container */
        .bg-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            background-image: url('https://max-lud09.github.io/videos/Background.jpg');
        }

        body.presentation-mode .bg-image-container { z-index: 1; }

        body.presentation-mode .studio-preview {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* Overlay im Präsentationsmodus */
        body.presentation-mode .overlay {
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: auto;
        }
        body.presentation-mode .overlay.active { opacity: 1; }

        /* GEMEINSAMER GLASSMORPHISM-STIL (Zeitplan, Ende, Werbung) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.4);
            color: #1e1e1e;
        }

        /* FESTE GRÖSSE DES WEISSEN FELDES (Zeitplan) */
        .overlay {
            width: 1100px;
            min-width: 1100px;
            max-width: 1100px;
            min-height: 700px;
            border-radius: 3rem 3rem 2rem 2rem;
            padding: 2.5rem 2.8rem;
            border-top: 4px solid #c02f2f;
            border-bottom: 4px solid #c02f2f;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.3s;
        }

        /* Animationen */
        @keyframes expandDown {
            0% { transform: scaleY(0); opacity: 0; transform-origin: top; }
            100% { transform: scaleY(1); opacity: 1; transform-origin: top; }
        }
        @keyframes collapseUp {
            0% { transform: scaleY(1); opacity: 1; transform-origin: top; }
            100% { transform: scaleY(0); opacity: 0; transform-origin: top; }
        }
        .overlay.first-page { animation: expandDown 0.5s ease-out; }
        .overlay.last-page { animation: collapseUp 0.5s ease-in forwards; }

        /* Kopfzeile */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
        }
        .logo-bhrt img {
            height: 70px; background: white; border-radius: 12px; padding: 6px 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .logo-paralympics img {
            height: 80px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }
        .day-badge {
            font-size: 2rem; font-weight: 700; background: #fff; color: #c02f2f;
            padding: 0.6rem 2rem; border-radius: 4rem; border: 2px solid #c02f2f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Zeitplan-Einträge */
        .schedule-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.8rem; }
        .schedule-item {
            background: rgba(249, 249, 249, 0.8);
            border-radius: 2rem; padding: 1rem 1.8rem;
            display: flex; align-items: center; gap: 1.5rem;
            border-left: 6px solid transparent; border-right: 6px solid transparent;
            transition: all 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .schedule-item:hover { background: #fff; transform: scale(1.01); }
        .schedule-item.live-highlight {
            border-left: 6px solid #ed354f; border-right: 6px solid #ed354f;
            background: #fffafa; transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(237,53,79,0.2);
        }
        .time {
            font-size: 2.2rem; font-weight: 800; min-width: 150px; color: #1281c6;
        }
        .event-info { flex: 1; }
        .event-name { font-size: 1.8rem; font-weight: 600; color: #1e1e1e; }
        .event-name-bs { font-size: 1.4rem; font-style: italic; color: #666; margin-top: 4px; }
        
        .badge {
            padding: 0.6rem 1.2rem; border-radius: 3rem; font-weight: 600; font-size: 1.2rem;
            text-transform: uppercase; color: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .badge.live { background: #ed354f; }
        .badge.stream { background: #1281c6; }
        .badge.news { background: #03a750; }
        .badge.analysis { background: #f39c12; }
        .badge.studio { background: #8e44ad; }

        .footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; color: #888; font-size: 1.3rem;
            border-top: 1px solid rgba(0,0,0,0.1); padding-top: 1.5rem;
        }

        /* Steuerleiste */
        .control-bar {
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 60px;
            padding: 1rem 2rem; margin-top: 1.5rem; display: flex; flex-wrap: wrap;
            gap: 0.8rem; justify-content: center; position: relative; z-index: 10;
        }
        .ctrl-btn {
            background: #2c3e50; color: white; border: none; border-radius: 3rem;
            padding: 0.7rem 1.5rem; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .ctrl-btn.special { background: #c02f2f; }
        .ctrl-btn.ad { background: #f39c12; color: #000; }
        .ctrl-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* BROADCAST ENDE (Neu gestaltet im Glassmorphism-Look) */
        .broadcast-end {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .broadcast-end.active { display: flex; }
        .end-rectangle {
            border-top: 6px solid #c02f2f; border-bottom: 6px solid #c02f2f;
            padding: 4rem 6rem; max-width: 1000px; width: 80%;
            text-align: center; position: relative; overflow: hidden;
        }
        .end-logos { display: flex; justify-content: center; align-items: center; gap: 4rem; margin-bottom: 2.5rem; }
        .end-logos img { height: 90px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .end-text { color: #1e1e1e; font-size: 3.5rem; font-weight: 800; text-transform: uppercase; line-height: 1.3; }
        .end-text .lang-bs { font-size: 2.5rem; color: #c02f2f; font-weight: 600; margin-top: 10px; }
        .end-text .lang-cyrl { font-family: 'Segoe UI', sans-serif; font-size: 2.5rem; color: #1281c6; font-weight: 600; }

        /* WERBUNG OVERLAY (Neu gestaltet im Glassmorphism-Look) */
        .ad-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1500; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .ad-overlay.active { display: flex; }
        .ad-rectangle {
            border-top: 6px solid #f39c12; border-bottom: 6px solid #f39c12;
            padding: 3rem 6rem; text-align: center; max-width: 800px;
        }
        .ad-text { color: #1e1e1e; font-size: 3rem; font-weight: 800; text-transform: uppercase; }
        .ad-text .small { font-size: 2rem; font-weight: 600; color: #f39c12; margin-top: 10px; }
        .ad-text .small-cyrl { font-size: 2rem; font-weight: 600; color: #666; }

        /* Deko-Elemente für Ende/Werbung */
        .animated-squares { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: -1; opacity: 0.4; }
        .square {
            position: absolute; width: 80px; height: 80px; border-radius: 20px;
            background: rgba(200,200,200,0.3); border: 2px solid rgba(0,0,0,0.1);
            animation: moveSquare 10s infinite linear;
        }
        .square:nth-child(1) { top: 10%; left: -5%; animation-delay: 0s; }
        .square:nth-child(2) { top: 60%; left: 85%; width: 120px; height: 120px; animation-delay: 2s; }
        .square:nth-child(3) { top: -10%; left: 70%; width: 60px; height: 60px; animation-delay: 4s; }
        @keyframes moveSquare {
            0% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(180deg) translateY(-20px); }
            100% { transform: rotate(360deg) translateY(0); }
        }

        /* NATIVES VOLLBILD-VIDEO PLAYER */
        .video-player-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 3000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .video-player-overlay.active { display: flex; }
        .video-player-overlay video {
            width: 100%; height: 100%; object-fit: contain; background: #000;
        }
        .close-video-btn {
            position: absolute; top: 30px; right: 40px; background: rgba(255,255,255,0.2);
            color: white; border: none; font-size: 2rem; width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer; z-index: 3010; transition: 0.3s;
            display: flex; justify-content: center; align-items: center;
        }
        .close-video-btn:hover { background: #c02f2f; transform: scale(1.1); }

        .video-preload { display: none; }
    </style>
</head>
<body>
    <div class="bg-image-container" id="bgImageContainer"></div>

    <div class="video-preload">
        <video id="videoIntro1" preload="auto" src="https://max-lud09.github.io/videos/BHT.mp4"></video>
        <video id="videoIntro2" preload="auto" src="https://max-lud09.github.io/videos/OBS.mp4"></video>
    </div>

    <div class="video-player-overlay" id="videoPlayerOverlay">
        <button class="close-video-btn" id="closeVideoBtn" title="Close Video (Esc)">✕</button>
        <video id="mainVideoPlayer" controls></video>
    </div>

    <div class="broadcast-end" id="broadcastEnd">
        <div class="end-rectangle glass-panel">
            <div class="animated-squares">
                <div class="square"></div><div class="square"></div><div class="square"></div>
            </div>
            <div class="end-logos">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Logo_of_BHRT_%281998-%29.svg" alt="BHRT">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/2026_Winter_Paralympics_logo.svg" alt="Paralympics">
            </div>
            <div class="end-text">
                <div>BROADCAST ENDED</div>
                <div class="lang-bs">EMITOVANJE ZAVRŠENO</div>
                <div class="lang-cyrl">ЕМИТОВАЊЕ ЗАВРШЕНО</div>
            </div>
        </div>
    </div>

    <div class="ad-overlay" id="adOverlay">
        <div class="ad-rectangle glass-panel">
            <div class="animated-squares">
                <div class="square"></div><div class="square"></div><div class="square"></div>
            </div>
            <div class="ad-text" id="adText"></div>
        </div>
    </div>

    <div class="studio-preview">
        <div class="upload-area" style="margin-bottom: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <label for="fileInput" class="ctrl-btn" style="cursor: pointer;">📄 Upload Schedule (.txt)</label>
            <input type="file" id="fileInput" accept=".txt, text/plain" style="display:none;">
            
            <label for="bgImageInput" class="ctrl-btn" style="cursor: pointer;">🖼️ Custom Background</label>
            <input type="file" id="bgImageInput" accept="image/*" style="display:none;">
            
            <button class="ctrl-btn" id="loadSampleBtn">📋 Load Sample</button>
        </div>

        <div class="overlay glass-panel" id="overlay">
            <div class="header">
                <div class="logo-bhrt">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Logo_of_BHRT_%281998-%29.svg" alt="BHRT">
                </div>
                <div class="day-badge" id="dayDisplay">PARALYMPICS MILANO CORTINA</div>
                <div class="logo-paralympics">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/2026_Winter_Paralympics_logo.svg" alt="Milano Cortina 2026">
                </div>
            </div>

            <div class="schedule-container" id="scheduleContainer">
                <div class="schedule-list" id="scheduleList"></div>
            </div>

            <div class="footer">
                <span id="pageInfo">Page 1 / 1</span>
                <span>↑↓·←→ Navigation | Space: Hide/Show</span>
            </div>
        </div>

        <div class="control-bar">
            <button class="ctrl-btn special" id="btnPresentation">S (Presentation)</button>
            <button class="ctrl-btn" id="btnBroadcastEnd">E (Broadcast End)</button>
            <button class="ctrl-btn ad" id="btnAdStart">W (Ad Start)</button>
            <button class="ctrl-btn ad" id="btnAdStop">X (Ad Stop)</button>
            <button class="ctrl-btn" id="btnIntro1">1 (BHRT Intro)</button>
            <button class="ctrl-btn" id="btnIntro2">2 (Para Intro)</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- ZEITPLAN-FUNKTIONALITÄT ----------
            let allEntries = [];
            let currentPage = 0;
            const pageSize = 5;
            let highlightIndex = 0;
            let isAnimating = false;

            const sampleData = [
                "DAY 2 – SUN 08 MAR 2026|07:55|Live Studio Opening - Day 2 Preview|Uživo otvaranje studija - pregled 2. dana|studio",
                "DAY 2 – SUN 08 MAR 2026|08:15|Wheelchair Curling - Round Robin (Session 3)|Karling u invalidskim kolicima - 3. sesija|live",
                "DAY 2 – SUN 08 MAR 2026|09:30|BHRTV News - Morning Edition|BHRTV vijesti - jutarnje izdanje|news",
                "DAY 2 – SUN 08 MAR 2026|09:40|Para Alpine Skiing - Super-G (Women/Men)|Para alpsko skijanje - superveleslalom (žene/muškarci)|live",
                "DAY 2 – SUN 08 MAR 2026|11:34|Para Biathlon - Sprint (Finals)|Para biatlon - sprint (finale)|stream",
                "DAY 2 – SUN 08 MAR 2026|12:45|Studio Mid-Day Wrap - Analysis & Highlights|Podnevni pregled - analiza i vrhunci|analysis"
            ];

            function parseTextFileContent(text) {
                return text.split(/\r?\n/).filter(l => l.trim() !== '').map(line => {
                    const parts = line.split('|').map(s => s.trim());
                    if (parts.length >= 5) return { day: parts[0], time: parts[1], en: parts[2], bs: parts[3], type: parts[4].toLowerCase() };
                    return null;
                }).filter(Boolean);
            }

            function renderPage() {
                const container = document.getElementById('scheduleList');
                const dayDisplay = document.getElementById('dayDisplay');
                const overlay = document.getElementById('overlay');
                
                if (allEntries.length === 0) {
                    container.innerHTML = `<div class="schedule-item" style="justify-content:center; color:#666;">📄 No data loaded</div>`;
                    document.getElementById('pageInfo').innerText = 'Page 0 / 0';
                    return;
                }

                dayDisplay.innerText = allEntries[0].day.toUpperCase();
                const pageEntries = allEntries.slice(currentPage * pageSize, (currentPage + 1) * pageSize);
                const totalPages = Math.ceil(allEntries.length / pageSize);

                if (!isAnimating) overlay.classList.remove('first-page', 'last-page');

                let htmlStr = pageEntries.map((entry, idx) => {
                    const isHighlight = (idx === highlightIndex);
                    const highlightClass = isHighlight ? 'live-highlight' : '';
                    return `
                        <div class="schedule-item ${highlightClass}" data-page-index="${idx}">
                            <div class="time">${entry.time}</div>
                            <div class="event-info">
                                <div class="event-name">${entry.en}</div>
                                <div class="event-name-bs">${entry.bs}</div>
                            </div>
                            <div class="badge ${entry.type}">${entry.type}</div>
                        </div>`;
                }).join('');
                
                container.innerHTML = htmlStr;
                document.getElementById('pageInfo').innerText = `Page ${currentPage + 1} / ${totalPages}`;
            }

            function moveHighlight(direction) {
                const pageLen = allEntries.slice(currentPage * pageSize, (currentPage + 1) * pageSize).length;
                const totalPages = Math.ceil(allEntries.length / pageSize);
                
                if (direction === -1 && highlightIndex === 0 && currentPage > 0) return changePage(-1, 'last');
                if (direction === 1 && highlightIndex === pageLen - 1 && currentPage < totalPages - 1) return changePage(1, 'first');
                
                const newIdx = highlightIndex + direction;
                if (newIdx >= 0 && newIdx < pageLen) { highlightIndex = newIdx; renderPage(); }
            }

            function changePage(delta, target) {
                const totalPages = Math.ceil(allEntries.length / pageSize);
                if (isAnimating || currentPage + delta < 0 || currentPage + delta >= totalPages) return;
                
                isAnimating = true;
                setTimeout(() => {
                    currentPage += delta;
                    const pageLen = allEntries.slice(currentPage * pageSize, (currentPage + 1) * pageSize).length;
                    highlightIndex = target === 'last' ? pageLen - 1 : 0;
                    renderPage();
                    setTimeout(() => isAnimating = false, 100);
                }, 50);
            }

            // ---------- OVERLAYS & VIDEOS ----------
            const broadcastEnd = document.getElementById('broadcastEnd');
            const adOverlay = document.getElementById('adOverlay');
            const adText = document.getElementById('adText');
            
            const videoPlayerOverlay = document.getElementById('videoPlayerOverlay');
            const mainVideoPlayer = document.getElementById('mainVideoPlayer');

            function toggleBroadcastEnd() { broadcastEnd.classList.toggle('active'); }

            function showAdStart() {
                adText.innerHTML = `<div>ADVERTISEMENT</div><div class="small">REKLAMA</div><div class="small-cyrl">РЕКЛАМА</div>`;
                adOverlay.classList.add('active');
            }

            function showAdEnd() {
                adText.innerHTML = `<div>ADVERTISEMENT ENDED</div><div class="small">REKLAMA ZAVRŠENA</div><div class="small-cyrl">РЕКЛАМА ЗАВРШЕНА</div>`;
                adOverlay.classList.add('active');
                setTimeout(() => adOverlay.classList.remove('active'), 3000);
            }

            // Neues natives Fullscreen-Video
            function playVideoFullscreen(videoId) {
                const source = document.getElementById(videoId);
                if (!source) return;
                
                mainVideoPlayer.src = source.src;
                videoPlayerOverlay.classList.add('active');
                mainVideoPlayer.play();
                
                // Fordere Browser-Vollbild für das Overlay an
                if (videoPlayerOverlay.requestFullscreen) videoPlayerOverlay.requestFullscreen();
                else if (videoPlayerOverlay.webkitRequestFullscreen) videoPlayerOverlay.webkitRequestFullscreen();
            }

            function closeVideo() {
                mainVideoPlayer.pause();
                mainVideoPlayer.src = "";
                videoPlayerOverlay.classList.remove('active');
                if (document.fullscreenElement) document.exitFullscreen();
            }

            // Schließe Video, wenn es zu Ende ist
            mainVideoPlayer.addEventListener('ended', closeVideo);
            document.getElementById('closeVideoBtn').addEventListener('click', closeVideo);

            function togglePresentationMode() {
                const body = document.body;
                if (!body.classList.contains('presentation-mode')) {
                    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
                body.classList.toggle('presentation-mode');
                document.getElementById('overlay').classList.toggle('active', !body.classList.contains('presentation-mode'));
            }

            // Keyboard-Shortcuts aufräumen
            window.addEventListener('keydown', (e) => {
                // Wenn Video läuft, erlaube Escape zum Schließen
                if (videoPlayerOverlay.classList.contains('active') && e.key === 'Escape') {
                    closeVideo(); return;
                }

                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 's', 'e', 'w', 'x', '1', '2'].includes(e.key.toLowerCase())) {
                    if(e.target.tagName !== 'INPUT') e.preventDefault();
                }
                
                if (e.key === 'ArrowUp') moveHighlight(-1);
                else if (e.key === 'ArrowDown') moveHighlight(1);
                else if (e.key === 'ArrowLeft') changePage(-1, 'first');
                else if (e.key === 'ArrowRight') changePage(1, 'first');
                else if (e.key === ' ' && document.body.classList.contains('presentation-mode')) {
                    const ov = document.getElementById('overlay');
                    if(ov.classList.contains('active')) { ov.classList.add('last-page'); setTimeout(()=>ov.classList.remove('active','last-page'), 600); }
                    else { ov.classList.add('active','first-page'); setTimeout(()=>ov.classList.remove('first-page'), 600); }
                }
                else if (e.key.toLowerCase() === 's') togglePresentationMode(); 
                else if (e.key.toLowerCase() === 'e') toggleBroadcastEnd(); // Geändert auf 'E' wegen Konflikt mit 'S'
                else if (e.key.toLowerCase() === 'w') showAdStart();
                else if (e.key.toLowerCase() === 'x') { adOverlay.classList.remove('active'); showAdEnd(); }
                else if (e.key === '1') playVideoFullscreen('videoIntro1');
                else if (e.key === '2') playVideoFullscreen('videoIntro2');
            });

            // Event Listener UI
            document.getElementById('fileInput').addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = ev => { allEntries = parseTextFileContent(ev.target.result); currentPage = highlightIndex = 0; renderPage(); };
                if (e.target.files[0]) reader.readAsText(e.target.files[0]);
            });
            document.getElementById('bgImageInput').addEventListener('change', e => {
                const reader = new FileReader();
                reader.onload = ev => document.getElementById('bgImageContainer').style.backgroundImage = `url('${ev.target.result}')`;
                if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
            });
            
            document.getElementById('loadSampleBtn').addEventListener('click', () => { allEntries = parseTextFileContent(sampleData.join('\n')); currentPage = highlightIndex = 0; renderPage(); });
            document.getElementById('btnPresentation').addEventListener('click', togglePresentationMode);
            document.getElementById('btnBroadcastEnd').addEventListener('click', toggleBroadcastEnd);
            document.getElementById('btnAdStart').addEventListener('click', showAdStart);
            document.getElementById('btnAdStop').addEventListener('click', () => { adOverlay.classList.remove('active'); showAdEnd(); });
            document.getElementById('btnIntro1').addEventListener('click', () => playVideoFullscreen('videoIntro1'));
            document.getElementById('btnIntro2').addEventListener('click', () => playVideoFullscreen('videoIntro2'));
            
            document.addEventListener('click', e => {
                const item = e.target.closest('.schedule-item');
                if (item) { highlightIndex = parseInt(item.dataset.pageIndex); renderPage(); }
            });

            // Init
            allEntries = parseTextFileContent(sampleData.join('\n'));
            renderPage();
        })();
    </script>
</body>
</html>
