<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BHRT · Paralympics Milano Cortina · Dynamic Studio</title>
    <!-- HLS.js für ältere Browser, wird nur bei Bedarf geladen -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            transition: background 0.3s;
        }

        /* Präsentationsmodus */
        body.presentation-mode {
            padding: 0;
            background: #000;
            display: block;
        }
        body.presentation-mode .control-panel {
            display: none;
        }
        body.presentation-mode .bg-image-container {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        body.presentation-mode .studio-preview {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        body.presentation-mode .overlay {
            max-width: 1200px;
            width: 90vw;
            background: #ffffff;
            border-radius: 3rem;
            padding: 2rem;
            border: 4px solid #c02f2f;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5);
            pointer-events: auto;
            transition: opacity 0.3s, transform 0.3s;
        }
        body.presentation-mode .overlay.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* Control Panel */
        .control-panel {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            color: white;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #c02f2f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-section {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: center;
        }
        .btn {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #555;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn:hover { background: #3e5a70; }
        .btn.red { background: #c02f2f; }
        .btn.red:hover { background: #a52828; }
        .btn.green { background: #03a750; }
        .btn.green:hover { background: #028a40; }
        .input-field {
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #444;
            background: #222;
            color: white;
            width: 200px;
            font-size: 0.95rem;
        }
        .input-field::placeholder {
            color: #888;
        }
        .hotkey-badge {
            background: #c02f2f;
            color: white;
            border-radius: 1rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            margin-left: 0.3rem;
        }

        /* Overlay-Hauptcontainer */
        .overlay {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 3rem;
            padding: 2rem;
            border: 4px solid #c02f2f;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            color: #1e1e1e;
            transition: all 0.3s;
        }
        .mode-indicator {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #c02f2f;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ========== SCHEDULE MODUS ========== */
        .schedule-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo-bhrt img, .logo-paralympics img {
            height: 60px;
            background: white;
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .day-badge {
            font-size: 1.8rem;
            font-weight: 700;
            background: #f0f0f0;
            color: #c02f2f;
            padding: 0.6rem 2rem;
            border-radius: 4rem;
            border: 2px solid #c02f2f;
            text-align: center;
        }
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .schedule-item {
            background: #f9f9f9;
            border-radius: 2rem;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .schedule-item.live-highlight {
            border-left: 6px solid #ed354f;
            border-right: 6px solid #ed354f;
            background: #ffeeee;
            transform: scale(1.01);
            box-shadow: 0 0 0 2px rgba(237,53,79,0.2);
        }
        .time {
            font-size: 1.8rem;
            font-weight: 800;
            min-width: 130px;
            color: #1281c6;
        }
        .event-info { flex: 1; }
        .event-name { font-size: 1.4rem; font-weight: 600; }
        .event-name-bs { font-size: 1.1rem; font-style: italic; color: #666; }
        .badge {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-weight: 600;
            color: white;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .badge.live { background: #ed354f; }
        .badge.stream { background: #1281c6; }
        .badge.news { background: #03a750; }
        .badge.analysis { background: #f39c12; }
        .badge.studio { background: #8e44ad; }
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            color: #888;
            font-size: 1.1rem;
            border-top: 1px dashed #ccc;
            padding-top: 1rem;
        }

        /* ========== MULTIVIEW ========== */
        .multiview-controls {
            background: #f0f0f0;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .stream-config-row {
            display: grid;
            grid-template-columns: 3fr 1fr 0.5fr;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
            align-items: center;
        }
        .stream-config-row input {
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            border: 1px solid #ccc;
            width: 100%;
        }
        .multiview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        .stream-box {
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid #c02f2f;
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column;
        }
        .stream-box video {
            width: 100%;
            height: 100%;
            background: #111;
            object-fit: cover;
        }
        .stream-label {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 0.4rem;
            text-align: center;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========== SINGLE STREAM ========== */
        .single-stream-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .single-stream-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .single-stream-controls input {
            flex: 1 1 250px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 2rem;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
        }
        .moderator-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(192,47,47,0.95);
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 700;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* ========== ENDCARD ========== */
        .endcard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 2rem;
            min-height: 400px;
            padding: 2rem;
        }
        .endcard-logos {
            display: flex;
            gap: 3rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .endcard-logos img {
            height: 80px;
            background: white;
            border-radius: 20px;
            padding: 10px;
        }
        .endcard-message {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.5;
        }
        .message-english { color: #c02f2f; }
        .message-bosnian { color: #1281c6; font-style: italic; }
        .message-cyrillic { font-family: 'Noto Serif', 'Times New Roman', serif; color: #03a750; }

        /* Intro Overlay */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .intro-overlay video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .schedule-header { flex-direction: column; }
            .day-badge { font-size: 1.4rem; }
            .time { font-size: 1.4rem; min-width: 100px; }
            .event-name { font-size: 1.2rem; }
            .multiview-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .multiview-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Intro Overlay -->
    <div id="introOverlay" class="intro-overlay">
        <video id="introVideo" playsinline></video>
    </div>

    <!-- Hintergrundbild-Container -->
    <div id="bgImageContainer" class="bg-image-container" style="background-image: none;"></div>

    <!-- Hauptcontainer -->
    <div class="studio-preview">
        <!-- Control Panel -->
        <div class="control-panel">
            <div class="panel-section">
                <span style="color:#c02f2f; font-weight:700; font-size:1.2rem;">BHRT</span>
                <button class="btn red" id="loadScheduleBtn"><span>📁</span> Schedule</button>
                <input type="file" id="fileInput" accept=".txt" style="display:none;">
                
                <button class="btn" id="loadIntro1Btn"><span>🎬</span> Intro 1</button>
                <input type="file" id="intro1Input" accept="video/*" style="display:none;">
                <button class="btn" id="loadIntro2Btn"><span>🎬</span> Intro 2</button>
                <input type="file" id="intro2Input" accept="video/*" style="display:none;">
                
                <button class="btn" id="loadBgBtn"><span>🖼️</span> Bg Image</button>
                <input type="file" id="bgImageInput" accept="image/*" style="display:none;">
            </div>
            <div class="panel-section">
                <span class="hotkey-badge">1</span><span>Schedule</span>
                <span class="hotkey-badge">2</span><span>Multi</span>
                <span class="hotkey-badge">3</span><span>Single</span>
                <span class="hotkey-badge">4</span><span>End</span>
                <span class="hotkey-badge">I</span><span>Intro1</span>
                <span class="hotkey-badge">J</span><span>Intro2</span>
                <span class="hotkey-badge">␣</span><span>Show/Hide</span>
                <span class="hotkey-badge">Ctrl</span><span>Presentation</span>
            </div>
        </div>

        <!-- Dynamisches Overlay -->
        <div id="overlay" class="overlay">
            <div id="modeIndicator" class="mode-indicator">📋 Schedule Mode</div>
            
            <!-- MODUS 1: Schedule -->
            <div id="scheduleMode">
                <div class="schedule-header">
                    <div class="logo-bhrt"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Logo_of_BHRT_%281998-%29.svg" alt="BHRT" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2280%22%20height%3D%2260%22%3E%3Crect%20width%3D%2280%22%20height%3D%2260%22%20fill%3D%22%23c02f2f%22%2F%3E%3Ctext%20x%3D%2210%22%20y%3D%2240%22%20fill%3D%22white%22%20font-size%3D%2230%22%3EBHRT%3C%2Ftext%3E%3C%2Fsvg%3E';"></div>
                    <div id="dayDisplay" class="day-badge">PARALYMPICS MILANO CORTINA</div>
                    <div class="logo-paralympics"><img src="https://upload.wikimedia.org/wikipedia/commons/8/83/2026_Winter_Paralympics_logo.svg" alt="Milano Cortina" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2280%22%20height%3D%2280%22%3E%3Ccircle%20cx%3D%2240%22%20cy%3D%2240%22%20r%3D%2230%22%20fill%3D%22%23c02f2f%22%2F%3E%3C%2Fsvg%3E';"></div>
                </div>
                <div id="scheduleList" class="schedule-list"></div>
                <div id="endOfDayMessage" style="text-align:center; font-size:1.8rem; color:#c02f2f; margin-top:1rem; display:none;">END OF THE PARALYMPIC DAY</div>
                <div class="footer">
                    <span id="pageInfo">Page 1 / 1</span>
                    <span>↑↓ Select · ←→ Pages</span>
                </div>
            </div>

            <!-- MODUS 2: Multiview (8 Streams) -->
            <div id="multiviewMode" style="display:none;">
                <div class="multiview-controls">
                    <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                        <h3>🎥 8 Streams</h3>
                        <button class="btn green" id="applyStreamsBtn">Apply Streams</button>
                    </div>
                    <div id="streamConfigs"></div>
                </div>
                <div id="multiviewGrid" class="multiview-grid"></div>
            </div>

            <!-- MODUS 3: Single Stream + Moderator -->
            <div id="singleStreamMode" style="display:none;">
                <div class="single-stream-container">
                    <div class="single-stream-controls">
                        <input type="text" id="singleStreamUrl" class="input-field" placeholder="Stream URL (mp4, m3u8)" style="flex:3;">
                        <input type="text" id="moderatorName" class="input-field" placeholder="Moderator Name" style="flex:1;">
                        <button class="btn green" id="loadSingleStream">Load</button>
                    </div>
                    <div class="video-wrapper">
                        <video id="singleVideo" playsinline controls crossorigin="anonymous"></video>
                        <div id="moderatorOverlay" class="moderator-overlay" style="display:none;"></div>
                    </div>
                </div>
            </div>

            <!-- MODUS 4: Endcard -->
            <div id="endcardMode" style="display:none;">
                <div class="endcard">
                    <div class="endcard-logos">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d6/Logo_of_BHRT_%281998-%29.svg" alt="BHRT" onerror="this.src='data:image/svg+xml...'">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/2026_Winter_Paralympics_logo.svg" alt="Paralympics" onerror="this.src='data:image/svg+xml...'">
                    </div>
                    <div class="endcard-message">
                        <div class="message-english">THE STREAM HAS ENDED</div>
                        <div class="message-bosnian">PRIJENOS JE ZAVRŠEN</div>
                        <div class="message-cyrillic">ПРИЈЕНОС ЈЕ ЗАВРШЕН</div>
                    </div>
                    <div style="font-size:1.2rem; color:#666;">Thank you for watching BHRT</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Globale Variablen ----------
            let allEntries = [];
            let currentPage = 0;
            const pageSize = 5;
            let highlightIndex = 0;
            let currentMode = 'schedule';
            let intro1Blob = null;
            let intro2Blob = null;
            let hlsInstances = []; // Für HLS.js-Instanzen

            // Beispiel-Zeitplan (heute 14:30 - 20:30)
            const sampleData = [
                "DAY 3 – MON 09 MAR 2026|14:30|Wheelchair Curling - Round Robin (Session 5)|Karling u invalidskim kolicima - 5. sesija|live",
                "DAY 3 – MON 09 MAR 2026|15:15|BHRTV News - Afternoon Update|BHRTV vijesti - poslijepodnevne vijesti|news",
                "DAY 3 – MON 09 MAR 2026|15:30|Para Alpine Skiing - Giant Slalom|Para alpsko skijanje - veleslalom|live",
                "DAY 3 – MON 09 MAR 2026|16:45|Studio Interview - Guest Athlete|Studio intervju - gość|studio",
                "DAY 3 – MON 09 MAR 2026|17:30|Para Ice Hockey - Quarterfinal|Para hokej na ledu - četvrtfinale|live",
                "DAY 3 – MON 09 MAR 2026|19:00|Para Biathlon - Pursuit Finals|Para biatlon - potjera finale|live",
                "DAY 3 – MON 09 MAR 2026|20:00|BHRTV News - Evening Main News|BHRTV vijesti - glavne večernje vijesti|news",
                "DAY 3 – MON 09 MAR 2026|20:30|The Nightly Recap - Medal Ceremony|Večernji pregled - ceremonija|analysis"
            ];

            // ---------- Hilfsfunktionen ----------
            function parseTextFileContent(text) {
                return text.split(/\r?\n/).filter(l => l.trim()).map(line => {
                    const parts = line.split('|').map(s => s.trim());
                    if (parts.length >= 5) {
                        return { day: parts[0], time: parts[1], en: parts[2], bs: parts[3], type: parts[4].toLowerCase() };
                    }
                    return null;
                }).filter(e => e);
            }

            function renderSchedule() {
                const container = document.getElementById('scheduleList');
                const dayDisplay = document.getElementById('dayDisplay');
                if (!container) return;
                if (allEntries.length === 0) {
                    container.innerHTML = '<div class="schedule-item">No data</div>';
                    document.getElementById('pageInfo').innerText = 'Page 0/0';
                    return;
                }
                dayDisplay.innerText = allEntries[0]?.day.toUpperCase() || 'PARALYMPICS';
                const start = currentPage * pageSize;
                const pageEntries = allEntries.slice(start, start + pageSize);
                const totalPages = Math.ceil(allEntries.length / pageSize);
                let html = '';
                pageEntries.forEach((e, idx) => {
                    const highlightClass = (idx === highlightIndex) ? 'live-highlight' : '';
                    const badgeClass = `badge ${e.type}`;
                    html += `<div class="schedule-item ${highlightClass}" data-index="${idx}">
                        <div class="time">${e.time}</div>
                        <div class="event-info">
                            <div class="event-name">${e.en}</div>
                            <div class="event-name-bs">${e.bs}</div>
                        </div>
                        <div class="${badgeClass}">${e.type}</div>
                    </div>`;
                });
                container.innerHTML = html;
                document.getElementById('pageInfo').innerText = `Page ${currentPage+1} / ${totalPages}`;
                document.getElementById('endOfDayMessage').style.display = (currentPage === totalPages-1) ? 'block' : 'none';
            }

            // ---------- Videowiedergabe (HLS-Fallback) ----------
            function loadVideo(videoElement, url, options = {}) {
                if (!videoElement) return;
                // Bestehende HLS-Instanz beenden
                const existingHls = hlsInstances.find(h => h.media === videoElement);
                if (existingHls) { existingHls.destroy(); hlsInstances = hlsInstances.filter(h => h.media !== videoElement); }
                
                // Prüfen auf HLS (m3u8)
                const isHls = url.toLowerCase().includes('.m3u8');
                if (isHls && videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    // Safari / native HLS
                    videoElement.src = url;
                } else if (isHls && Hls.isSupported()) {
                    // HLS.js für andere Browser
                    const hls = new Hls(options);
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                    hlsInstances.push(hls);
                } else {
                    // normales Video
                    videoElement.src = url;
                }
                videoElement.play().catch(e => console.log('Autoplay prevented', e));
            }

            // ---------- Intros abspielen ----------
            function playIntro(blob) {
                if (!blob) return;
                const overlay = document.getElementById('introOverlay');
                const video = document.getElementById('introVideo');
                const url = URL.createObjectURL(blob);
                video.src = url;
                overlay.style.display = 'flex';
                video.onended = () => {
                    overlay.style.display = 'none';
                    URL.revokeObjectURL(url);
                };
                video.play().catch(e => {
                    console.warn('Intro autoplay failed, waiting for user interaction');
                    // Fallback: Event-Listener für ersten Klick
                    const playHandler = () => {
                        video.play();
                        document.removeEventListener('click', playHandler);
                    };
                    document.addEventListener('click', playHandler);
                });
            }

            // ---------- Multiview Setup ----------
            function setupMultiview() {
                const configDiv = document.getElementById('streamConfigs');
                configDiv.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const row = document.createElement('div');
                    row.className = 'stream-config-row';
                    row.innerHTML = `
                        <input type="text" id="streamUrl${i}" placeholder="Stream ${i+1} URL (mp4/m3u8)">
                        <input type="text" id="streamTitle${i}" placeholder="Titel">
                        <button class="btn small" id="testStream${i}" style="padding:0.4rem;">▶️</button>
                    `;
                    configDiv.appendChild(row);
                    document.getElementById(`testStream${i}`).addEventListener('click', () => {
                        const url = document.getElementById(`streamUrl${i}`).value;
                        if (url) window.open(url, '_blank');
                    });
                }
            }

            function applyMultiviewStreams() {
                const grid = document.getElementById('multiviewGrid');
                grid.innerHTML = '';
                // Alte HLS-Instanzen zerstören (alle, die nicht mehr gebraucht werden)
                hlsInstances.forEach(hls => hls.destroy());
                hlsInstances = [];

                for (let i = 0; i < 8; i++) {
                    const url = document.getElementById(`streamUrl${i}`).value;
                    const title = document.getElementById(`streamTitle${i}`).value || `Stream ${i+1}`;
                    const box = document.createElement('div');
                    box.className = 'stream-box';
                    const video = document.createElement('video');
                    video.id = `multiVideo${i}`;
                    video.playsInline = true;
                    video.autoplay = true;
                    video.muted = (i !== 0); // Nur erster Stream Ton
                    video.controls = false;
                    
                    if (url) {
                        loadVideo(video, url, { autoStartLoad: true, startPosition: -1 });
                    }
                    
                    box.appendChild(video);
                    const label = document.createElement('div');
                    label.className = 'stream-label';
                    label.innerText = title;
                    box.appendChild(label);
                    grid.appendChild(box);
                }
            }

            // ---------- Einzelstream + Moderator ----------
            function loadSingleStream() {
                const url = document.getElementById('singleStreamUrl').value;
                const video = document.getElementById('singleVideo');
                const modName = document.getElementById('moderatorName').value;
                
                if (!url) return;
                
                loadVideo(video, url);
                
                const modDiv = document.getElementById('moderatorOverlay');
                if (modName) {
                    modDiv.innerText = `🎙️ ${modName}`;
                    modDiv.style.display = 'block';
                } else {
                    modDiv.style.display = 'none';
                }
            }

            // ---------- Moduswechsel ----------
            function setMode(mode) {
                currentMode = mode;
                document.getElementById('scheduleMode').style.display = (mode === 'schedule') ? 'block' : 'none';
                document.getElementById('multiviewMode').style.display = (mode === 'multiview') ? 'block' : 'none';
                document.getElementById('singleStreamMode').style.display = (mode === 'single') ? 'block' : 'none';
                document.getElementById('endcardMode').style.display = (mode === 'endcard') ? 'block' : 'none';
                const modeNames = { schedule: '📋 Schedule', multiview: '📺 Multiview', single: '🎥 Single Stream', endcard: '🏁 Endcard' };
                document.getElementById('modeIndicator').innerText = modeNames[mode] || '';
                if (mode === 'multiview') setupMultiview();
            }

            // ---------- Präsentationsmodus ----------
            function togglePresentation() {
                document.body.classList.toggle('presentation-mode');
                const overlay = document.getElementById('overlay');
                if (document.body.classList.contains('presentation-mode')) {
                    overlay.classList.add('hidden');
                } else {
                    overlay.classList.remove('hidden');
                }
            }
            function toggleOverlay() {
                if (!document.body.classList.contains('presentation-mode')) return;
                document.getElementById('overlay').classList.toggle('hidden');
            }

            // ---------- Event-Listener ----------
            document.addEventListener('DOMContentLoaded', () => {
                // Datei-Uploads
                document.getElementById('loadScheduleBtn').addEventListener('click', () => document.getElementById('fileInput').click());
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            allEntries = parseTextFileContent(ev.target.result);
                            currentPage = 0; highlightIndex = 0;
                            renderSchedule();
                        };
                        reader.readAsText(file);
                    }
                });

                document.getElementById('loadIntro1Btn').addEventListener('click', () => document.getElementById('intro1Input').click());
                document.getElementById('intro1Input').addEventListener('change', (e) => {
                    intro1Blob = e.target.files[0];
                });
                document.getElementById('loadIntro2Btn').addEventListener('click', () => document.getElementById('intro2Input').click());
                document.getElementById('intro2Input').addEventListener('change', (e) => {
                    intro2Blob = e.target.files[0];
                });

                document.getElementById('loadBgBtn').addEventListener('click', () => document.getElementById('bgImageInput').click());
                document.getElementById('bgImageInput').addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            document.getElementById('bgImageContainer').style.backgroundImage = `url('${ev.target.result}')`;
                        };
                        reader.readAsDataURL(file);
                    }
                });

                document.getElementById('loadSingleStream').addEventListener('click', loadSingleStream);
                document.getElementById('applyStreamsBtn').addEventListener('click', applyMultiviewStreams);

                // Hotkeys
                window.addEventListener('keydown', (e) => {
                    const key = e.key;
                    if (['1','2','3','4','I','J',' ','9','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key)) {
                        e.preventDefault();
                    }
                    if (key === '1') setMode('schedule');
                    else if (key === '2') setMode('multiview');
                    else if (key === '3') setMode('single');
                    else if (key === '4') setMode('endcard');
                    else if (key === 'I' && intro1Blob) playIntro(intro1Blob);
                    else if (key === 'J' && intro2Blob) playIntro(intro2Blob);
                    else if (key === ' ') toggleOverlay();
                    else if (key === '9') togglePresentation();

                    // Navigation nur im Schedule-Modus
                    if (currentMode === 'schedule' && allEntries.length > 0) {
                        const totalPages = Math.ceil(allEntries.length / pageSize);
                        if (key === 'ArrowUp') {
                            if (highlightIndex > 0) { highlightIndex--; renderSchedule(); }
                            else if (currentPage > 0) { currentPage--; highlightIndex = pageSize-1; renderSchedule(); }
                        } else if (key === 'ArrowDown') {
                            const pageEntries = allEntries.slice(currentPage*pageSize, currentPage*pageSize+pageSize);
                            if (highlightIndex < pageEntries.length-1) { highlightIndex++; renderSchedule(); }
                            else if (currentPage < totalPages-1) { currentPage++; highlightIndex = 0; renderSchedule(); }
                        } else if (key === 'ArrowLeft') {
                            if (currentPage > 0) { currentPage--; highlightIndex = 0; renderSchedule(); }
                        } else if (key === 'ArrowRight') {
                            if (currentPage < totalPages-1) { currentPage++; highlightIndex = 0; renderSchedule(); }
                        }
                    }
                });

                // Klick auf Schedule-Item
                document.addEventListener('click', (e) => {
                    const item = e.target.closest('.schedule-item');
                    if (item && currentMode === 'schedule') {
                        highlightIndex = parseInt(item.dataset.index);
                        renderSchedule();
                    }
                });

                // Initialisierung
                allEntries = sampleData.map(line => {
                    const parts = line.split('|');
                    return { day: parts[0], time: parts[1], en: parts[2], bs: parts[3], type: parts[4] };
                });
                renderSchedule();
                setMode('schedule');
                setupMultiview();
            });

            // Aufräumen bei Fensterschließen (optional)
            window.addEventListener('beforeunload', () => {
                hlsInstances.forEach(hls => hls.destroy());
            });
        })();
    </script>
</body>
</html>
